<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>憤怒豬 Angry Pig</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #6db8e8; }
    body { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; }
    #game { position: fixed; top: 0; left: 0; display: block; touch-action: none; }

    /* 手機虛擬搖桿 + 發射鈕 */
    #touch-controls { display: none; }
    #touch-controls.show { display: block; }
    #joystick { position: fixed; left: 24px; bottom: 24px; width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,.14); border: 2px solid rgba(255,255,255,.4); z-index: 7; touch-action: none; }
    #joy-knob { position: absolute; left: 50%; top: 50%; width: 54px; height: 54px; border-radius: 50%;
      background: rgba(255,255,255,.6); transform: translate(-50%,-50%); box-shadow: 0 2px 8px rgba(0,0,0,.35); }
    #fire-btn { position: fixed; right: 26px; bottom: 32px; width: 92px; height: 92px; border-radius: 50%;
      z-index: 7; touch-action: none; padding: 0; line-height: 1.1; font-size: 16px; font-weight: 800; color: #fff;
      background: rgba(224,83,59,.9); border: 3px solid rgba(255,255,255,.55); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    #fire-btn:active { background: rgba(200,60,40,.98); transform: scale(.95); }
    /* 觸控裝置：蓄力條上移到搖桿上方，避免被搖桿/發射鈕遮住 */
    body.touch #power { bottom: 158px; }
    #pause-btn { position: fixed; top: 12px; right: 12px; z-index: 7; width: 44px; height: 44px; border-radius: 50%;
      padding: 0; font-size: 20px; color: #fff; background: rgba(0,0,0,.4); border: 2px solid rgba(255,255,255,.45);
      box-shadow: none; }
    #pause-btn:active { background: rgba(0,0,0,.6); }

    /* 準星 */
    #crosshair {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 22px; height: 22px; pointer-events: none; z-index: 4;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,.85), 0 0 4px rgba(0,0,0,.6);
    }
    #crosshair::before { left: 50%; top: 0; width: 3px; height: 100%; transform: translateX(-50%); }
    #crosshair::after { top: 50%; left: 0; height: 3px; width: 100%; transform: translateY(-50%); }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; padding: 12px 16px;
      display: flex; align-items: center; gap: 22px; pointer-events: none;
      color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,.6), 0 0 3px rgba(0,0,0,.4); z-index: 5;
      background: linear-gradient(rgba(0,0,0,.32), rgba(0,0,0,0));
    }
    .stat { display: flex; flex-direction: column; gap: 2px; white-space: nowrap; }
    .stat .k { font-size: 11px; letter-spacing: 1px; opacity: .85; }
    .stat .v { font-size: 22px; font-weight: 800; line-height: 1; }
    #ammo, #pigs { font-size: 18px; letter-spacing: 2px; }
    @media (max-width: 560px) {
      #hud { gap: 12px; padding: 9px 12px; }
      .stat .k { font-size: 10px; }
      .stat .v { font-size: 17px; }
      #ammo, #pigs { font-size: 15px; letter-spacing: 1px; }
    }

    /* 蓄力條 */
    #power {
      position: fixed; left: 50%; bottom: 48px; transform: translateX(-50%);
      width: 230px; height: 14px; border-radius: 999px; z-index: 5;
      background: rgba(0,0,0,.5); border: 2px solid rgba(255,255,255,.55);
      overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.45);
    }
    #power-fill { height: 100%; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, #6ee787, #ffd24a, #ff5544); transition: width .02s linear; }

    /* 死鬥模式波數橫幅 */
    #wave-banner { position: fixed; top: 32%; left: 50%; transform: translate(-50%, -50%);
      z-index: 6; pointer-events: none; text-align: center; color: #fff; }
    #wave-banner.hidden { display: none; }
    #wave-banner .wb-title { font-size: 46px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 3px 14px rgba(0,0,0,.6); }
    #wave-banner.boss .wb-title { color: #ff5544; }
    #wave-banner .wb-sub { font-size: 20px; font-weight: 800; color: #ffe27a; text-shadow: 0 2px 8px rgba(0,0,0,.6); }
    #wave-banner.show { animation: waveBanner 1.6s ease-out forwards; }
    @keyframes waveBanner {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.6); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      70% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -62%) scale(1); }
    }

    /* 空中 BONUS 倍率條 */
    #air-bonus {
      position: fixed; top: 78px; left: 50%; transform: translateX(-50%);
      z-index: 5; pointer-events: none; text-align: center; color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.5);
    }
    #air-bonus.hidden { display: none; }
    #air-bonus .ab-label { font-size: 12px; letter-spacing: 2px; font-weight: 700; opacity: .95; }
    #air-bonus #ab-mult { color: #ffd24a; font-size: 15px; margin-left: 4px; }
    #air-bonus .ab-bar { width: 240px; height: 10px; border-radius: 999px; margin: 5px auto 3px;
      background: rgba(0,0,0,.35); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
    #air-bonus #ab-fill { height: 100%; width: 0%; border-radius: 999px;
      background: linear-gradient(90deg, #6ee787, #ffd24a, #ff5544); transition: width .08s linear; }
    #air-bonus #ab-value { font-size: 24px; font-weight: 800; color: #ffe27a;
      text-shadow: 0 2px 8px rgba(0,0,0,.6); }

    /* 開始 / 結束 覆蓋 */
    #overlay, #msg, #pause {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; background: rgba(0,0,0,.5); z-index: 10; color: #fff;
    }
    #overlay.hidden, #msg.hidden, #pause.hidden { display: none; }
    /* 死鬥暫停提示（右下角） */
    #pause-hint { position: fixed; right: 14px; bottom: 14px; z-index: 6; pointer-events: none;
      font-size: 12px; font-weight: 700; color: #fff; background: rgba(0,0,0,.35);
      padding: 6px 12px; border-radius: 999px; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
    #pause-hint.hidden { display: none; }
    .box { background: #fff; color: #222; border-radius: 18px; padding: 30px 42px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.4); max-width: 460px; }

    /* 關卡選擇選單 */
    .menu { background: #fff; color: #222; border-radius: 20px; padding: 32px 40px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.4); max-width: 720px; }
    .menu h2 { font-size: 26px; margin-bottom: 10px; }
    .menu .howto { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 22px; }
    .menu .tip { font-size: 12px; color: #999; margin-top: 20px; }
    #level-list { display: grid; grid-template-columns: repeat(5, 84px); gap: 10px; justify-content: center; }
    .level-card { display: flex; flex-direction: column; align-items: center; gap: 3px;
      width: 84px; padding: 10px 6px; border-radius: 12px; background: #f4f4f8;
      box-shadow: 0 3px 8px rgba(0,0,0,.08); cursor: pointer; transition: transform .12s, box-shadow .12s; }
    .level-card:hover:not(.locked) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.16); background: #fff; }
    .level-card.locked { cursor: not-allowed; opacity: .55; }
    .level-card .lv-num { font-size: 22px; font-weight: 800; color: #e0533b; line-height: 1; }
    .level-card.locked .lv-num { color: #aaa; }
    .level-card .lv-name { font-size: 12px; font-weight: 600; color: #444; }
    .level-card .lv-stars .cs { font-size: 14px; color: #d9d9e0; }
    .level-card .lv-stars .cs.on { color: #ffc32b; }
    .box h2 { font-size: 26px; margin-bottom: 10px; }
    .box p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 18px; }
    button { cursor: pointer; border: none; font: inherit; font-size: 16px; font-weight: 700;
      color: #fff; background: #e0533b; padding: 12px 30px; border-radius: 999px;
      box-shadow: 0 6px 16px rgba(224,83,59,.4); }
    button:hover { background: #c9432d; }
    button.ghost { background: #e9e9ee; color: #444; box-shadow: none; }
    button.ghost:hover { background: #dcdce3; }
    .btnrow { display: flex; gap: 12px; justify-content: center; }
    /* 暫停 / 結算視窗：羊皮紙木框風（與首頁一致） */
    #pause .box, #msg .box { background: #fbf1d6; color: #6b4a2a; border: 5px solid #d3934e;
      border-radius: 24px; box-shadow: 0 0 0 4px #a86a34, 0 22px 50px rgba(0,0,0,.45); }
    #pause .box h2, #msg .box h2 { color: #7a4a1e; font-size: 30px; }
    #pause #pause-text { color: #8a6a44; font-weight: 700; }
    #pause .btnrow, #msg .btnrow { margin-top: 8px; }
    #pause .btnrow button, #msg .btnrow button { border-radius: 16px; padding: 13px 24px; font-weight: 900;
      box-shadow: 0 4px 0 rgba(0,0,0,.18); transition: transform .08s; }
    #pause .btnrow button:active, #msg .btnrow button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
    #resume-btn, #msg #next { background: linear-gradient(#ff9a3d, #ff6a00); }
    #resume-btn:hover, #msg #next:hover { background: linear-gradient(#ffa74e, #ff7a12); }
    #pause .btnrow .ghost, #msg .btnrow .ghost { background: #ecdcb4; color: #7a5a34; box-shadow: 0 4px 0 rgba(0,0,0,.12); }
    #pause .btnrow .ghost:hover, #msg .btnrow .ghost:hover { background: #f6ead0; }
    /* 星星 */
    #stars { display: flex; gap: 10px; justify-content: center; margin: 6px 0 14px; }
    #stars .star {
      font-size: 46px; line-height: 1; color: #d9d9e0;
      transform: scale(.4); opacity: .35; transition: transform .35s cubic-bezier(.2,1.6,.4,1), color .2s, opacity .2s;
    }
    #stars .star.on { color: #ffc32b; opacity: 1; transform: scale(1); text-shadow: 0 3px 10px rgba(255,195,43,.6); }
    kbd { background: #eee; border-radius: 5px; padding: 1px 7px; font-family: monospace; color: #333; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #6db8e8; color: #fff; font-size: 16px; z-index: 20; }

    /* 登入頁（輸入名字才能開始） */
    /* ===== 首頁（農場木框風，使用 asset 素材）===== */
    #landing { position: fixed; inset: 0; z-index: 12; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #7cc7f0 url(assets/ui/bg.webp) center/cover no-repeat; }
    #landing.hidden { display: none; }
    /* 兩側裝飾（彈弓 / 箱子）；窄螢幕隱藏 */
    .land-deco { position: absolute; bottom: 0; z-index: 1; pointer-events: none;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.25)); }
    .land-slingshot { left: 1vw; width: min(24vw, 340px); }
    .land-crates { right: -1vw; width: min(28vw, 430px); }
    @media (max-width: 860px) { .land-deco { display: none; } }
    /* 中央木框面板（panel.webp 拉伸當背景） */
    .land-panel { position: relative; z-index: 2; width: min(90vw, 430px); max-height: 96vh; overflow: visible;
      background: url(assets/ui/panel.webp) center/100% 100% no-repeat;
      padding: 34px 42px 30px; display: flex; flex-direction: column; align-items: stretch; gap: 9px;
      color: #6b4a2a; text-align: center; }
    .land-title { display: block; width: 96%; max-width: 400px; margin: -78px auto 2px; pointer-events: none;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,.25)); }
    #online-badge { align-self: center; display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 800; color: #2e9e5b; background: rgba(232,250,238,.9); border-radius: 999px; padding: 4px 12px; }
    #online-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759;
      box-shadow: 0 0 0 0 rgba(52,199,89,.6); animation: pulse 1.6s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52,199,89,.5); } 70% { box-shadow: 0 0 0 7px rgba(52,199,89,0); } 100% { box-shadow: 0 0 0 0 rgba(52,199,89,0); } }
    .land-name-label { font-size: 12px; font-weight: 800; color: #9a7b52; letter-spacing: 1px; margin-top: 2px; }
    #name-input { width: 100%; font-size: 20px; font-weight: 800; text-align: center; padding: 9px 14px;
      border: 2px solid #d9c39a; border-radius: 12px; outline: none; color: #5a3d20; background: rgba(255,255,255,.6); }
    #name-input:focus { border-color: #e0771a; }
    /* 大按鈕（開始 / 死鬥） */
    #start-btn, #endless-btn { width: 100%; border: none; border-radius: 16px; color: #fff; cursor: pointer;
      font-weight: 900; padding: 12px; line-height: 1.15; box-shadow: 0 5px 0 rgba(0,0,0,.18), 0 8px 14px rgba(0,0,0,.2);
      display: flex; flex-direction: column; align-items: center; gap: 1px; transition: transform .1s, filter .1s; }
    #start-btn { background: linear-gradient(#ff9a3d, #ff6a00); }
    #endless-btn { background: linear-gradient(#e85466, #c11f2b); }
    #start-btn span.big, #endless-btn span.big { font-size: 21px; letter-spacing: 1px; }
    #start-btn small, #endless-btn small { font-size: 12px; font-weight: 700; opacity: .92; }
    #start-btn:hover:not(:disabled), #endless-btn:hover:not(:disabled) { filter: brightness(1.05); }
    #start-btn:active:not(:disabled), #endless-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.18); }
    #start-btn:disabled, #endless-btn:disabled { background: #c9bfa6; box-shadow: none; cursor: not-allowed; opacity: .7; }
    #name-hint { font-size: 12px; color: #d24a2a; font-weight: 800; margin: -2px 0; min-height: 14px; }
    /* 小功能鈕（圖示上、字在下） */
    .landing-btns { display: flex; gap: 8px; justify-content: center; }
    .landing-btns .ghost { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-size: 11px; font-weight: 800; color: #7a5a34; background: rgba(255,255,255,.55); border: 2px solid #d9c39a;
      border-radius: 12px; padding: 7px 2px; cursor: pointer; box-shadow: none; }
    .landing-btns .ghost .ico { font-size: 20px; line-height: 1; }
    .landing-btns .ghost:hover { background: #fff7e6; }
    .landing-stat { font-size: 12px; font-weight: 700; color: #7a5a34; margin-top: 2px; line-height: 1.5; }
    .landing-stat b { color: #d2691e; font-weight: 900; }
    #fb-link { align-self: center; display: inline-block; width: auto; padding: 5px 16px; border-radius: 999px;
      font-weight: 800; font-size: 12px; color: #fff; background: #1877f2; text-decoration: none; box-shadow: 0 3px 0 rgba(0,0,0,.15); }
    #fb-link:hover { background: #3b8bf5; }
    .land-panel .tip { font-size: 10px; color: #a98f6a; margin-top: 2px; }

    /* 彈窗（排行榜 / 留言板 / 上線人數 共用） */
    .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.55); z-index: 15; }
    .modal.hidden { display: none; }
    .lb-card { background: #fff; color: #222; border-radius: 18px; width: 90%; max-width: 440px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    .lb-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px;
      font-size: 18px; font-weight: 800; border-bottom: 1px solid #eee; }
    .lb-head button { background: #eee; color: #666; box-shadow: none; padding: 4px 12px; font-size: 16px; }
    #lb-list { overflow-y: auto; padding: 10px 16px 18px; }
    .lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-bottom: 1px solid #f2f2f5; font-size: 15px; }
    .lb-rank { width: 26px; text-align: center; font-weight: 800; color: #bbb; }
    .lb-rank.top { color: #ffc32b; font-size: 18px; }
    .lb-name { flex: 1; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-lv { font-size: 12px; color: #888; }
    .lb-score { font-weight: 800; color: #e0533b; min-width: 64px; text-align: right; }
    .lb-empty { text-align: center; color: #999; padding: 24px; font-size: 14px; }
    .lb-src { text-align: center; font-size: 12px; font-weight: 700; color: #888; padding: 2px 0 10px; }
    .lb-row.me { background: #fff3ec; box-shadow: inset 0 0 0 2px #f0a58e; border-radius: 8px; }
    .lb-filter { display: flex; align-items: center; gap: 8px; padding: 12px 20px 4px; }
    .lb-filter label { font-size: 12px; font-weight: 700; color: #666; }
    #lb-level { flex: 1; font-size: 14px; font-weight: 700; color: #333; padding: 7px 10px;
      border: 2px solid #e6e6ee; border-radius: 10px; background: #fff; outline: none; cursor: pointer; }
    #lb-level:focus { border-color: #e0533b; }

    /* 過關畫面：本關名次 + 迷你排行榜 */
    #msg-rank { font-size: 16px; font-weight: 800; color: #444; margin: 4px 0 10px; }
    #msg-rank:empty { display: none; }
    #msg-rank b { color: #e0533b; font-size: 22px; }
    #msg-rank .rank-src { font-size: 13px; font-weight: 800; color: #8a6a44; }
    #msg-lb { text-align: left; margin: 0 auto 16px; max-width: 320px; }
    #msg-lb:empty { display: none; }
    #msg-lb .lb-row { font-size: 14px; padding: 5px 6px; }

    /* 選單玩家列 */
    .menu-actions { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    #who { font-size: 13px; font-weight: 700; color: #555; }
    #who b { color: #e0533b; }

    /* 留言板 */
    .msg-compose { display: flex; gap: 8px; padding: 12px 16px 4px; }
    #msg-text { flex: 1; min-width: 0; font-size: 14px; padding: 9px 12px; border: 2px solid #e6e6ee;
      border-radius: 10px; outline: none; color: #222; }
    #msg-text:focus { border-color: #e0533b; }
    #msg-send { padding: 9px 16px; font-size: 14px; }
    #msg-list { overflow-y: auto; padding: 10px 16px 18px; }
    .msg-item { padding: 9px 6px; border-bottom: 1px solid #f2f2f5; font-size: 14px; text-align: left; }
    .msg-item .m-name { font-weight: 800; color: #e0533b; }
    .msg-item .m-when { font-size: 11px; color: #aaa; margin-left: 6px; }
    .msg-item .m-text { color: #333; margin-top: 2px; word-break: break-word; }
    .msg-item .m-reply { border-left: 3px solid #f0d0c6; margin: 4px 0 0 10px; padding-left: 8px; }
    .m-empty { text-align: center; color: #999; padding: 24px; font-size: 14px; }

    /* 上線人數圖表 */
    #online-body { padding: 14px 16px 20px; }
    .on-now { text-align: center; font-size: 14px; color: #444; margin-bottom: 10px; }
    .on-now b { color: #2e9e5b; font-size: 20px; }
    #online-body svg { width: 100%; height: auto; }
    .on-empty { text-align: center; color: #999; padding: 20px; font-size: 14px; }

    /* 特殊彈藥槽（死鬥）：右側直排 */
    #specials { position: fixed; right: 12px; top: 50%; transform: translateY(-50%); z-index: 6;
      display: flex; flex-direction: column; gap: 10px; }
    #specials.hidden { display: none; }
    .sp-slot { position: relative; width: 52px; height: 52px; border-radius: 12px; padding: 0;
      display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: none;
      background: rgba(0,0,0,.42); border: 2px solid rgba(255,255,255,.4); }
    .sp-slot .sp-emoji { font-size: 26px; line-height: 1; }
    .sp-slot .sp-key { position: absolute; top: -7px; left: -7px; width: 18px; height: 18px; border-radius: 50%;
      background: #333; color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .sp-slot.sel { border-color: #ffd24a; background: rgba(224,83,59,.55); box-shadow: 0 0 0 3px rgba(255,210,74,.5); }
    .sp-slot.used { opacity: .35; }

    /* 商店 */
    #shop-list { padding: 8px 16px 18px; }
    .shop-item { display: flex; align-items: center; gap: 12px; padding: 11px 6px; border-bottom: 1px solid #f2f2f5; }
    .shop-emoji { font-size: 30px; }
    .shop-info { flex: 1; text-align: left; }
    .shop-name { font-weight: 800; color: #333; }
    .shop-desc { font-size: 12px; color: #888; }
    .shop-toggle { padding: 7px 14px; font-size: 13px; background: #e9e9ee; color: #444; box-shadow: none; }
    .shop-toggle.on { background: #e0533b; color: #fff; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="crosshair"></div>

  <div id="hud">
    <div class="stat"><span class="k">關卡</span><span class="v" id="level"></span></div>
    <div class="stat"><span class="k">分數</span><span class="v" id="score">0</span></div>
    <div class="stat"><span class="k">彈藥</span><span class="v" id="ammo"></span></div>
    <div class="stat"><span class="k">剩餘動物</span><span class="v" id="pigs"></span></div>
  </div>
  <div id="power"><div id="power-fill"></div></div>

  <!-- 特殊彈藥槽（死鬥模式）：桌機按 1/2/3 選、手機點選 -->
  <div id="specials" class="hidden"></div>

  <!-- 手機虛擬搖桿（控準星）+ 發射鈕 -->
  <div id="touch-controls">
    <div id="joystick"><div id="joy-knob"></div></div>
    <button id="fire-btn">發射</button>
    <button id="pause-btn">⏸</button>
  </div>

  <div id="wave-banner" class="hidden"></div>
  <div id="pause-hint" class="hidden"><kbd>Esc</kbd> 暫停 / 結束</div>

  <!-- 死鬥暫停選單 -->
  <div id="pause" class="hidden">
    <div class="box">
      <h2>⏸ 暫停</h2>
      <p id="pause-text"></p>
      <div class="btnrow">
        <button id="resume-btn">▶ 繼續</button>
        <button id="end-btn" class="ghost">☠️ 結束死鬥</button>
      </div>
    </div>
  </div>

  <div id="air-bonus" class="hidden">
    <div class="ab-label">空中 BONUS<span id="ab-mult">x1</span></div>
    <div class="ab-bar"><div id="ab-fill"></div></div>
    <div id="ab-value">+0</div>
  </div>

  <div id="overlay">
    <div class="menu">
      <h2>🎯 選擇關卡</h2>
      <p class="howto">
        <kbd>移動滑鼠</kbd> 瞄準　<kbd>按住左鍵</kbd> 蓄力　<kbd>放開</kbd> 丟球　把動物撞下箱子摔到地板就消滅<br>
        遊戲中按 <kbd>Esc</kbd> 返回 ·　<kbd>M</kbd> 開關音樂
      </p>
      <div id="level-list"></div>
      <button id="to-home" class="ghost" style="margin-top:18px">← 返回首頁</button>
    </div>
  </div>

  <div id="msg" class="hidden">
    <div class="box">
      <h2 id="msg-title"></h2>
      <div id="stars"></div>
      <p id="msg-text"></p>
      <div id="msg-rank"></div>
      <div id="msg-lb"></div>
      <div class="btnrow">
        <button id="to-menu" class="ghost">選單</button>
        <button id="retry" class="ghost">重玩本關</button>
        <button id="next">下一關 ▶</button>
      </div>
    </div>
  </div>

  <!-- 登入頁：輸入名字才能開始 -->
  <div id="landing" class="hidden">
    <img class="land-deco land-slingshot" src="assets/ui/slingshot.webp" alt="" />
    <img class="land-deco land-crates" src="assets/ui/crates.webp" alt="" />
    <div class="land-panel">
      <img class="land-title" src="assets/ui/title.webp" alt="憤怒豬" />
      <div id="online-badge"><span class="dot"></span> 線上 <b id="online-n">–</b> 人</div>
      <div class="land-name-label">玩家名稱</div>
      <input id="name-input" maxlength="12" placeholder="輸入你的名字" autocomplete="off" />
      <button id="start-btn" disabled><span class="big">▶ 開始遊戲</span><small>選關卡挑戰</small></button>
      <button id="endless-btn" disabled><span class="big">☠️ 死鬥模式</span><small>無限波生存</small></button>
      <p id="name-hint">請先輸入名字才能開始</p>
      <div class="landing-btns">
        <button id="shop-btn-landing" class="ghost"><span class="ico">🛒</span>商店</button>
        <button id="lb-btn-landing" class="ghost"><span class="ico">🏆</span>排行榜</button>
        <button id="msg-btn-landing" class="ghost"><span class="ico">💬</span>留言板</button>
        <button id="online-btn-landing" class="ghost"><span class="ico">📈</span>上線</button>
        <button id="music-toggle" class="ghost"><span class="ico">🔊</span>音樂</button>
      </div>
      <div class="landing-stat">全服累計　🎮 <b id="total-plays">–</b> 場　🐾 <b id="total-kills">–</b> 隻　⏱ <b id="total-time">–</b></div>
      <a id="fb-link" href="https://www.facebook.com/people/Book-Ai/61584339789020/" target="_blank" rel="noopener">👍 追蹤 Book Ai 粉絲團</a>
      <p class="tip">名字存在這台裝置，並記錄你的最高分</p>
    </div>
  </div>

  <!-- 商店（裝備特殊彈藥）彈窗 -->
  <div id="shop-modal" class="modal hidden">
    <div class="lb-card">
      <div class="lb-head"><span>🛒 商店 · 特殊彈藥</span><button class="mclose" data-close="shop-modal">✕</button></div>
      <div class="lb-src" style="padding:10px 16px 0">免費裝備 · 死鬥模式每場各帶一顆（最多 3 種）</div>
      <div id="shop-list"></div>
    </div>
  </div>

  <!-- 排行榜彈窗 -->
  <div id="lb-modal" class="modal hidden">
    <div class="lb-card">
      <div class="lb-head"><span>🏆 排行榜（最高分）</span><button id="lb-close" class="mclose">✕</button></div>
      <div class="lb-filter"><label>關卡</label><select id="lb-level"></select></div>
      <div id="lb-list"></div>
    </div>
  </div>

  <!-- 留言板彈窗 -->
  <div id="msg-modal" class="modal hidden">
    <div class="lb-card">
      <div class="lb-head"><span>💬 留言板</span><button class="mclose" data-close="msg-modal">✕</button></div>
      <div class="msg-compose">
        <input id="msg-text" maxlength="120" placeholder="留個言…（最多 120 字）" autocomplete="off" />
        <button id="msg-send">送出</button>
      </div>
      <div id="msg-list"></div>
    </div>
  </div>

  <!-- 上線人數彈窗（近 7 天折線） -->
  <div id="online-modal" class="modal hidden">
    <div class="lb-card">
      <div class="lb-head"><span>📈 上線人數</span><button class="mclose" data-close="online-modal">✕</button></div>
      <div id="online-body"></div>
    </div>
  </div>

  <div id="loading">載入素材中…</div>

  <script type="module" src="./fps.js"></script>
</body>
</html>
